<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClawLite Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1a2e; color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; }
    .status { font-size: 12px; color: #4ade80; margin-left: auto; }
    .status.disconnected { color: #f87171; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
    .msg.user { align-self: flex-end; background: #3b82f6; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot { align-self: flex-start; background: #fff; color: #333; border: 1px solid #e5e5e5; border-bottom-left-radius: 4px; }
    .msg.system { align-self: center; background: #fef3c7; color: #92400e; font-size: 12px; border-radius: 8px; }
    .typing { align-self: flex-start; color: #999; font-size: 13px; font-style: italic; }
    #input-area { padding: 12px 20px; background: #fff; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; }
    #msg-input { flex: 1; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
    #msg-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    #send-btn { padding: 10px 20px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    #send-btn:hover { background: #2563eb; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .approval { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .approval h3 { font-size: 14px; margin-bottom: 8px; }
    .approval .actions { display: flex; gap: 8px; margin-top: 8px; }
    .approval button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .approval .approve { background: #22c55e; color: #fff; }
    .approval .reject { background: #ef4444; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>ClawLite</h1>
    <span id="status" class="status disconnected">Disconnected</span>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off">
    <button id="send-btn" disabled>Send</button>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const statusEl = document.getElementById('status');
    let ws = null;
    let chatId = null;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'status';
        sendBtn.disabled = false;
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected';
        statusEl.className = 'status disconnected';
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        switch (data.type) {
          case 'connected':
            chatId = data.chatId;
            addMessage('Connected to ClawLite', 'system');
            break;
          case 'message':
            addMessage(data.text, 'bot');
            removeTyping();
            break;
          case 'typing':
            showTyping();
            break;
          case 'approval':
            showApproval(data);
            break;
          case 'progress':
            addMessage(`[Progress] ${data.text || JSON.stringify(data.progress)}`, 'system');
            break;
          case 'job_started':
            addMessage(`Job started: ${data.jobId}`, 'system');
            break;
          case 'job_completed':
            addMessage(`Job completed: ${data.jobId}`, 'system');
            break;
          case 'job_failed':
            addMessage(`Job failed: ${data.jobId}`, 'system');
            break;
          case 'error':
            addMessage(`Error: ${data.text}`, 'system');
            break;
        }
      };
    }

    function send() {
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'message', chatId, text }));
      addMessage(text, 'user');
      input.value = '';
    }

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = `msg ${cls}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      if (document.querySelector('.typing')) return;
      const div = document.createElement('div');
      div.className = 'typing';
      div.textContent = 'Typing...';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const el = document.querySelector('.typing');
      if (el) el.remove();
    }

    function showApproval(data) {
      const div = document.createElement('div');
      div.className = 'approval';
      div.innerHTML = `<h3>${data.title || 'Approval Required'}</h3>
        <p>${data.preview || ''}</p>
        <div class="actions">
          <button class="approve" onclick="sendApproval('${data.approvalId}', 'approve')">Approve</button>
          <button class="reject" onclick="sendApproval('${data.approvalId}', 'reject')">Reject</button>
        </div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    window.sendApproval = function(approvalId, action) {
      if (!ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'approval', approvalId, action }));
      addMessage(`${action === 'approve' ? 'Approved' : 'Rejected'}: ${approvalId}`, 'system');
    };

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
    connect();
  </script>
</body>
</html>
